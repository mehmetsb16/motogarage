<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bakım Düzenle</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 50px; background: #f4f7f6; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Bakım Kaydını Düzenle</h2>
    <form th:action="@{/update-maintenance}" th:object="${maintenance}" method="post">
        <input type="hidden" th:field="*{id}" />
        <label>Başlık:</label>
        <input type="text" th:field="*{title}" required />
        <label>Açıklama:</label>
        <input type="text" th:field="*{description}" />
        <label>Durum:</label>
        <select th:field="*{completed}">
            <option th:value="true">Tamamlandı</option>
            <option th:value="false">Bekliyor</option>
        </select>
        <button type="submit">Güncelle</button>
    </form>
</div>
</body>
</html>
