<!DOCTYPE html>
<html>
<head>
    <title>Giriş Yap</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>MotoGarage Giriş</h2>
    <form th:action="@{/login}" method="post">
        <div><label> Kullanıcı Adı: <input type="text" name="username"/> </label></div>
        <br/>
        <div><label> Şifre: <input type="password" name="password"/> </label></div>
        <br/>
        <button type="submit">Giriş Yap</button>
    </form>
</div>
</body>
</html>
